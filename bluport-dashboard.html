<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bluport Creative - Personel Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f1117;
    --bg2: #1a1d27;
    --bg3: #242833;
    --border: #2e3345;
    --text: #e4e7f1;
    --text2: #8b90a5;
    --accent: #6366f1;
    --accent2: #818cf8;
    --green: #34d399;
    --yellow: #fbbf24;
    --red: #f87171;
    --blue: #60a5fa;
    --purple: #a78bfa;
    --pink: #f472b6;
    --orange: #fb923c;
    --cyan: #22d3ee;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0;
    width: 260px; background: var(--bg2);
    border-right: 1px solid var(--border);
    padding: 24px 16px;
    overflow-y: auto;
    z-index: 100;
  }

  .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; padding: 0 8px; }
  .logo-icon {
    width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent), var(--purple));
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 18px; color: white;
  }
  .logo-text { font-weight: 700; font-size: 16px; }
  .logo-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }

  .nav-section { margin-bottom: 24px; }
  .nav-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text2); padding: 0 12px; margin-bottom: 8px; }

  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 8px; cursor: pointer;
    transition: all 0.2s; font-size: 13px; font-weight: 500;
    color: var(--text2); position: relative;
  }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: rgba(99,102,241,0.15); color: var(--accent2); }
  .nav-item .badge {
    margin-left: auto; background: var(--bg3); padding: 2px 8px;
    border-radius: 10px; font-size: 11px; font-weight: 600;
  }
  .nav-item.active .badge { background: rgba(99,102,241,0.2); color: var(--accent2); }
  .nav-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* Main */
  .main { margin-left: 260px; padding: 24px 32px; }

  .header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 28px;
  }
  .header h1 { font-size: 24px; font-weight: 700; }
  .header-sub { color: var(--text2); font-size: 13px; margin-top: 4px; }

  .month-filter {
    display: flex; gap: 6px; background: var(--bg2); padding: 4px;
    border-radius: 10px; border: 1px solid var(--border);
  }
  .month-btn {
    padding: 7px 14px; border-radius: 7px; border: none;
    background: transparent; color: var(--text2); cursor: pointer;
    font-size: 12px; font-weight: 500; font-family: inherit;
    transition: all 0.2s;
  }
  .month-btn:hover { color: var(--text); }
  .month-btn.active { background: var(--accent); color: white; }

  /* Overview Cards */
  .overview-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 16px; margin-bottom: 28px;
  }
  .stat-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px;
  }
  .stat-card .label { font-size: 12px; color: var(--text2); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .stat-card .value { font-size: 28px; font-weight: 700; }
  .stat-card .change { font-size: 12px; margin-top: 6px; }
  .stat-card .change.up { color: var(--green); }
  .stat-card .change.down { color: var(--red); }

  /* Charts */
  .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 28px; }
  .chart-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px;
  }
  .chart-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
  .chart-container { position: relative; height: 280px; }

  /* Daily Table */
  .table-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px; margin-bottom: 28px;
  }
  .table-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 16px; }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left; font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text2); padding: 10px 12px;
    border-bottom: 1px solid var(--border); font-weight: 600;
  }
  tbody td {
    padding: 10px 12px; border-bottom: 1px solid rgba(46,51,69,0.5);
    font-size: 13px;
  }
  tbody tr:hover { background: rgba(99,102,241,0.05); }
  tbody tr { cursor: pointer; }

  .hours-bar {
    height: 6px; border-radius: 3px; background: var(--bg3);
    position: relative; min-width: 80px;
  }
  .hours-bar-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), var(--purple));
  }

  .firm-tag {
    display: inline-block; padding: 3px 8px; border-radius: 5px;
    font-size: 11px; font-weight: 500; background: rgba(99,102,241,0.12);
    color: var(--accent2); margin: 1px 2px;
  }

  /* Date Filter */
  .date-filter {
    display: flex; gap: 4px; background: var(--bg2); padding: 3px;
    border-radius: 10px; border: 1px solid var(--border); flex-shrink: 0;
  }
  .date-btn {
    padding: 6px 12px; border-radius: 7px; border: none;
    background: transparent; color: var(--text2); cursor: pointer;
    font-size: 11px; font-weight: 500; font-family: inherit;
    transition: all 0.2s; white-space: nowrap;
  }
  .date-btn:hover { color: var(--text); background: var(--bg3); }
  .date-btn.active { background: var(--accent); color: white; }

  /* Detail Expandable */
  .day-detail {
    display: none; background: var(--bg); border-radius: 8px;
    padding: 12px; margin: 4px 12px 8px;
  }
  .day-detail.show { display: block; }
  .detail-item {
    display: grid; grid-template-columns: 90px 120px 1fr 60px;
    gap: 8px; padding: 8px 10px; font-size: 12px;
    border-bottom: 1px solid rgba(46,51,69,0.3);
    align-items: start; border-radius: 6px; cursor: pointer;
    transition: background 0.15s;
  }
  .detail-item:hover { background: rgba(99,102,241,0.08); }
  .detail-item:last-child { border-bottom: none; }
  .detail-time { color: var(--cyan); font-weight: 500; font-family: monospace; }
  .detail-firm { color: var(--yellow); font-weight: 500; }
  .detail-desc { color: var(--text); font-weight: 400; }
  .detail-hours { color: var(--green); font-weight: 600; text-align: right; }
  .detail-task-info {
    display: none; grid-column: 1 / -1; padding: 8px 10px;
    background: rgba(99,102,241,0.06); border-radius: 6px;
    margin-top: 4px; font-size: 12px; color: var(--text2);
    border-left: 3px solid var(--accent);
  }
  .detail-task-info.show { display: block; }

  /* Firm Rankings */
  .firm-rank {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 0; border-bottom: 1px solid rgba(46,51,69,0.4);
  }
  .firm-rank:last-child { border-bottom: none; }
  .firm-rank .rank { font-size: 11px; color: var(--text2); width: 20px; font-weight: 600; }
  .firm-rank .name { font-size: 13px; font-weight: 500; flex: 1; }
  .firm-rank .hours { font-size: 13px; font-weight: 600; color: var(--accent2); }
  .firm-rank .tasks-count { font-size: 11px; color: var(--text2); margin-left: 8px; }
  .firm-bar { height: 4px; background: var(--bg3); border-radius: 2px; margin-top: 4px; flex: 1; }
  .firm-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent), var(--cyan)); }

  /* Genel Bakış */
  .team-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 28px; }
  .team-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; cursor: pointer;
    transition: all 0.2s; position: relative; overflow: hidden;
  }
  .team-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .team-card .name { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
  .team-card .metric { font-size: 22px; font-weight: 700; color: var(--accent2); }
  .team-card .metric-label { font-size: 10px; color: var(--text2); margin-top: 2px; }
  .team-card .mini-stats { display: flex; gap: 12px; margin-top: 10px; }
  .team-card .mini-stat { font-size: 11px; color: var(--text2); }
  .team-card .mini-stat span { color: var(--text); font-weight: 600; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }

  /* Responsive */
  @media (max-width: 1200px) { .overview-grid { grid-template-columns: repeat(2, 1fr); } .team-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 900px) { .sidebar { display: none; } .main { margin-left: 0; } .charts-grid { grid-template-columns: 1fr; } }

  .hidden { display: none; }
  .page { display: none; }
  .page.active { display: block; }

  .loading-shimmer {
    animation: shimmer 1.5s infinite;
    background: linear-gradient(90deg, var(--bg3) 25%, var(--bg2) 50%, var(--bg3) 75%);
    background-size: 200% 100%;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
</style>
</head>

function buildNav() {
  const nav = document.getElementById('nav-persons');
  const persons = Object.keys(SUMMARY_DATA);
  nav.innerHTML = persons.map(name => `
    <div class="nav-item" onclick="showPage('${name}')" data-person="${name}">
      <div class="nav-dot" style="background:${PERSON_COLORS[name]}"></div>
      ${name}
      <span class="badge">${SUMMARY_DATA[name].total.t}</span>
    </div>
  `).join('');
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

  if(id === 'overview') {
    document.getElementById('page-overview').classList.add('active');
    document.querySelector('.nav-item[onclick*="overview"]').classList.add('active');
  } else {
    const page = document.getElementById('page-' + id);
    if(page) page.classList.add('active');

// ==================== DATE FILTERING ====================
let currentFilter = 30;

function parseDateStr(dateStr) {
  // Format: DD.MM.YYYY
  const parts = dateStr.split('.');
  if(parts.length !== 3) return null;
  return new Date(parseInt(parts[2]), parseInt(parts[1])-1, parseInt(parts[0]));
}

function setDateFilter(range, personName) {
  currentFilter = range;
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

  let startDate = null;
  if(range === 'today') {
    startDate = today;
  } else if(range === 'yesterday') {
    startDate = new Date(today); startDate.setDate(startDate.getDate()-1);
  } else if(typeof range === 'number') {
    startDate = new Date(today); startDate.setDate(startDate.getDate() - range);
  }
  // 'all' => startDate stays null => show everything

  // Update active button styling
  if(personName) {
    const filterDiv = document.querySelector(`.person-date-filter[data-person="${personName}"]`);
    if(filterDiv) {
      filterDiv.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
      const label = range === 'today' ? 'Bugün' : range === 'yesterday' ? 'Dün' : range === 'all' ? 'Tümü' : range + ' Gün';
      filterDiv.querySelectorAll('.date-btn').forEach(b => { if(b.textContent.trim() === label) b.classList.add('active'); });
    }
  } else {
    const gf = document.getElementById('globalDateFilter');
    if(gf) {
      gf.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
      const label = range === 'today' ? 'Bugün' : range === 'yesterday' ? 'Dün' : range === 'all' ? 'Tümü' : range + ' Gün';
      gf.querySelectorAll('.date-btn').forEach(b => { if(b.textContent.trim() === label) b.classList.add('active'); });
    }
  }

  // Filter daily table rows
  const scope = personName ? document.getElementById('page-'+personName) : document;
  if(!scope) return;

  scope.querySelectorAll('.day-row').forEach(row => {
    const dateStr = row.getAttribute('data-date');
    const rowDate = parseDateStr(dateStr);
    let show = true;

    if(startDate && rowDate) {
      if(range === 'today' || range === 'yesterday') {
        show = rowDate.getTime() === startDate.getTime();
      } else {
        show = rowDate >= startDate;
      }
    }

    row.style.display = show ? '' : 'none';
    // Also hide the detail row
    const nextRow = row.nextElementSibling;
    if(nextRow && nextRow.classList.contains('day-row-detail')) {
      nextRow.style.display = show ? '' : 'none';
    }
  });

  // Update person stats cards if filtering a specific person
  if(personName) {
    updateFilteredStats(personName, startDate, range);
  }

  // If global filter on overview, update team cards
  if(!personName) {
    updateOverviewFiltered(startDate, range);
  }
}

function updateFilteredStats(name, startDate, range) {
  const d = SUMMARY_DATA[name];
  const filtered = d.daily.filter(day => {
    if(!startDate) return true;
    const dayDate = parseDateStr(day.d);
    if(!dayDate) return false;
    if(range === 'today' || range === 'yesterday') return dayDate.getTime() === startDate.getTime();
    return dayDate >= startDate;
  });

  const filteredH = filtered.reduce((s,x) => s + x.h, 0);
  const filteredT = filtered.reduce((s,x) => s + x.t, 0);
  const filteredDays = filtered.length;

  const page = document.getElementById('page-'+name);
  if(!page) return;
  const cards = page.querySelectorAll('.stat-card');
  if(cards.length >= 3) {
    cards[0].querySelector('.value').textContent = filteredT;
    cards[0].querySelector('.change').textContent = filteredDays > 0 ? (filteredT/filteredDays).toFixed(1) + ' görev/gün ort.' : '—';
    cards[1].querySelector('.value').textContent = filteredH.toFixed(1);
    cards[1].querySelector('.change').textContent = filteredDays > 0 ? (filteredH/filteredDays).toFixed(1) + ' saat/gün ort.' : '—';
    cards[2].querySelector('.value').textContent = filteredDays;
  }
}

function updateOverviewFiltered(startDate, range) {
  const persons = Object.keys(SUMMARY_DATA);
  let totalTasks = 0, totalHours = 0, totalDays = 0;

  persons.forEach(name => {
    const d = SUMMARY_DATA[name];
    const filtered = d.daily.filter(day => {
      if(!startDate) return true;
      const dayDate = parseDateStr(day.d);
      if(!dayDate) return false;
      if(range === 'today' || range === 'yesterday') return dayDate.getTime() === startDate.getTime();
      return dayDate >= startDate;
    });
    totalTasks += filtered.reduce((s,x) => s + x.t, 0);
    totalHours += filtered.reduce((s,x) => s + x.h, 0);
    totalDays = Math.max(totalDays, filtered.length);
  });

  const cards = document.querySelectorAll('#page-overview .stat-card');
  if(cards.length >= 4) {
    cards[1].querySelector('.value').textContent = totalTasks.toLocaleString('tr');
    cards[2].querySelector('.value').textContent = Math.round(totalHours).toLocaleString('tr');
    cards[2].querySelector('.change').textContent = totalDays > 0 ? (totalHours/totalDays).toFixed(1) + ' saat/gün ort.' : '—';
    cards[3].querySelector('.value').textContent = totalDays;
  }

  // Update team cards
  persons.forEach(name => {
    const d = SUMMARY_DATA[name];
    const filtered = d.daily.filter(day => {
      if(!startDate) return true;
      const dayDate = parseDateStr(day.d);
      if(!dayDate) return false;
      if(range === 'today' || range === 'yesterday') return dayDate.getTime() === startDate.getTime();
      return dayDate >= startDate;
    });
    const fH = filtered.reduce((s,x) => s + x.h, 0);
    const fT = filtered.reduce((s,x) => s + x.t, 0);
    const fD = filtered.length;

    const card = document.querySelector(`.team-card[onclick*="'${name}'"]`);
    if(card) {
      card.querySelector('.metric').innerHTML = fH.toFixed(1) + '<span style="font-size:12px;color:var(--text2)"> saat</span>';
      const miniStats = card.querySelectorAll('.mini-stat');
      if(miniStats[0]) miniStats[0].innerHTML = '<span>' + fT + '</span> görev';
      if(miniStats[1]) miniStats[1].innerHTML = '<span>' + (fD > 0 ? (fH/fD).toFixed(1) : '0') + '</span> s/gün';
    }
  });
}

          y: { grid: { color: 'rgba(46,51,69,0.3)' }, ticks: { color: '#8b90a5' }, beginAtZero: true }
        }
      }
    });
  });
}

  buildOverview();
